<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Battel.net</title>
    <link
      rel="shortcut icon"
      href="./src/images/favicon/favicon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./src/css/output.css" />
  </head>
  <body>
    <!-- #region wrapper -->
    <div class="wrapper">
      <!-- #region header -->
      <div class="header w-full bg-[#15171e] overflow-hidden">
        <div class="header_center w-full h-full mx-auto">
          <div class="header_top">
            <div class="top_left">
              <div
                class="hamburger w-10 h-10 hover:bg-white/5 m-2 rounded-[5px] flex items-center justify-center"
              >
                <svg
                  width="28px"
                  height="28px"
                  viewBox="0 0 24 24"
                  version="1.1"
                  xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink"
                  fill="#000000"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0" />

                  <g
                    id="SVGRepo_tracerCarrier"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />

                  <g id="SVGRepo_iconCarrier">
                    <title>Menu</title>
                    <g
                      id="Page-1"
                      stroke="none"
                      stroke-width="1"
                      fill="none"
                      fill-rule="evenodd"
                    >
                      <g id="Menu">
                        <rect
                          id="Rectangle"
                          fill-rule="nonzero"
                          x="0"
                          y="0"
                          width="24"
                          height="24"
                        ></rect>
                        <line
                          x1="5"
                          y1="7"
                          x2="19"
                          y2="7"
                          id="Path"
                          stroke="#fafafa"
                          stroke-width="2"
                          stroke-linecap="round"
                        ></line>
                        <line
                          x1="5"
                          y1="17"
                          x2="19"
                          y2="17"
                          id="Path"
                          stroke="#fafafa"
                          stroke-width="2"
                          stroke-linecap="round"
                        ></line>
                        <line
                          x1="5"
                          y1="12"
                          x2="19"
                          y2="12"
                          id="Path"
                          stroke="#fafafa"
                          stroke-width="2"
                          stroke-linecap="round"
                        ></line>
                      </g>
                    </g>
                  </g>
                </svg>
              </div>
              <div
                class="menuMobile w-[89%] h-screen absolute top-0 -left-full transition-all duration-300 bg-[#1A1C23]"
              >
                <div
                  class="close w-10 h-10 rounded-[5px] bg-[#424F6995] hover:bg-[#424F69] m-2 flex items-center justify-center"
                >
                  <svg
                    width="22px"
                    height="22px"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <g id="SVGRepo_bgCarrier" stroke-width="0" />

                    <g
                      id="SVGRepo_tracerCarrier"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />

                    <g id="SVGRepo_iconCarrier">
                      <path
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        d="M19.207 6.207a1 1 0 0 0-1.414-1.414L12 10.586 6.207 4.793a1 1 0 0 0-1.414 1.414L10.586 12l-5.793 5.793a1 1 0 1 0 1.414 1.414L12 13.414l5.793 5.793a1 1 0 0 0 1.414-1.414L13.414 12l5.793-5.793z"
                        fill="#fafafa"
                      />
                    </g>
                  </svg>
                </div>
                
              </div>
            </div>
          </div>
          <div class="header_bottom"></div>
        </div>
      </div>
      <!-- w-[388.91px] h-12 text-white/90 size-4 leading-4.5 hover:bg-white/5 rounded-sm -->
      <!-- #endregion header -->
    </div>
    <!-- #endregion wrapper -->

    <script>
      let hamburger = document.querySelector(".hamburger");
      let close = document.querySelector(".close");
      let menuMobile = document.querySelector(".menuMobile");
      hamburger.addEventListener("click", () => {
        menuMobile.classList.add("!left-0");
      });
      close.addEventListener("click", () => {
        menuMobile.classList.remove("!left-0");
        menuMobile.classList.add("!-left-full");
      });
    </script>
  </body>
</html>
